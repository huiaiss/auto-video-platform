<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 页面未找到 | 台州隆江自动化</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0a1628;color:#f0f4ff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
h1{font-size:clamp(80px,15vw,160px);font-weight:900;background:linear-gradient(135deg,#0066cc,#00a8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
p{color:#8a9bb5;font-size:18px;margin:20px 0 36px}
a{display:inline-block;padding:14px 32px;background:linear-gradient(135deg,#0066cc,#00a8ff);color:#fff;border-radius:12px;font-size:16px;font-weight:600;text-decoration:none;transition:all 0.25s}
a:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,87,184,0.4)}
</style>
</head>
<body>
<div>
<h1>404</h1>
<p>页面未找到 · Page Not Found</p>
<a href="/">返回首页</a>
</div>
</body>
</html>
